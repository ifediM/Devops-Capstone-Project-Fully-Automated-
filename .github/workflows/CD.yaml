name: "Devops Capstone - CD"


on:
  workflow_dispatch:

# Setting permissions at the top level so all jobs can use OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          cd terra-infrastructure   
          terraform iniit              

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Double check that secrets.AWS is just the 12-digit Account ID
          role-to-assume: arn:aws:iam::087097353362:role/github-actions
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve




     
      