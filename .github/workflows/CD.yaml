name: "EKS Deployment - CD"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Set the default directory for ALL steps in this job
    defaults:
      run:
        working-directory: terra-infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3
          terraform_wrapper: false

      # STEP 1: LOGIN FIRST
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::087097353362:role/github-actions
          aws-region: us-east-1

      
      # STEP 2: VERIFY LOGIN (Helpful for debugging)
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Bootstrap S3 Backend
        run: |
          BUCKET="devops-capstone-ifedi"
          if ! aws s3api head-bucket --bucket $BUCKET 2>/dev/null; then
            echo "Bucket does not exist. Creating..."
            aws s3api create-bucket --bucket $BUCKET --region us-east-1
            
            # 10-second pause to let AWS internal systems sync
            sleep 10
            
            aws s3api put-bucket-versioning \
              --bucket $BUCKET \
              --versioning-configuration Status=Enabled
              
            aws s3api put-public-access-block \
              --bucket $BUCKET \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          else
            echo "Bucket already exists."
          fi


      # STEP 3: INITIALIZE AND APPLY
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt  

      - name: Terraform Validation
        run: terraform validate   

      - name: Create tfvars file
        run: |
          cat <<EOF > terraform.tfvars
          ${{ secrets.TFVARS }}
          EOF
        # If your terraform commands run in a specific directory, 
        # make sure this file is created there!
        working-directory: terra-infrastructure  

      - name: Verify tfvars Syntax (Safe Check)
        run: |
          echo "Checking for quotes in terraform.tfvars..."
          # This counts how many double-quotes are in the file
          grep -o '"' terra-infrastructure/terraform.tfvars | wc -l
        # If this returns 0, the quotes are NOT reaching the file.

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="terraform.tfvars"      

      #- name: Terraform destroy
      #  run: terraform destroy -var-file="terraform.tfvars" -auto-approve
