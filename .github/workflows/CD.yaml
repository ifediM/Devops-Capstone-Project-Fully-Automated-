name: "Devops Capstone - CD"

on:
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read # Required to check out repo

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: activate terraform
        working-directory: /terra-infrastructure/auth.tf
        run: terraform init

      - name: terraform apply
        working-directory: /terra-infrastructure/auth.tf
        run: terraform apply  --auto-approve



  oidc:
    runs-on: ubuntu-latest
    needs: setup
    name: "Configure AWS credentials via OIDC"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # https://github.com/actions/checkout

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4 # https://github.com/aws-actions/configure-aws-credentials
        with:
          role-to-assume: arn:aws:iam::${{ secrets.aws }}:role/github-actions
          aws-region: us-east-1

      - name: Verify AWS access
        run: aws s3 ls

  terraform:
    needs: oidc
    name: "Terraform"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.0.1
          terraform_wrapper: false

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        #if: github.event_name == 'pull_request'
        # Route 53 zone must already exist for this to succeed!
        run: terraform plan 
        #continue-on-error: true

    
      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

            
        
      - name: Terraform Apply Global
        #if: github.event_name == 'push' || github.event_name == 'release'
        #working-directory: 07-managing-multiple-environments/file-structure/global
        run: |
          terraform init
          terraform apply -auto-approve

     
      